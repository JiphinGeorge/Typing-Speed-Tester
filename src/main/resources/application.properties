# ==========================================================================================
# APPLICATION.PROPERTIES - Spring Boot Configuration File
# ==========================================================================================
#
# This file configures how the Spring Boot application behaves.
# Spring Boot reads this file automatically at startup from src/main/resources/.
#
# You can override any Spring Boot default setting here.
# Full list of properties: https://docs.spring.io/spring-boot/appendix/application-properties/
# ==========================================================================================

# SERVER PORT CONFIGURATION
# Tells the embedded Tomcat server to listen on port 8080.
# When you visit http://localhost:8080, this is the port it uses.
# You can change this to any available port (e.g., 9090, 3000).
server.port=8080

# THYMELEAF CACHE CONFIGURATION
# When set to 'false', Thymeleaf will reload HTML templates on every request.
# This is useful during DEVELOPMENT because you can edit HTML files and see
# changes immediately without restarting the server.
# In PRODUCTION, set this to 'true' for better performance.
spring.thymeleaf.cache=false
