<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>XcelerType Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b981", 
                        "background-light": "#fcfdfd",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200 pb-32">
<!-- Main Navigation -->
<header class="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-800">
    <div class="flex items-center gap-3">
        <div class="p-2 bg-primary/10 rounded-lg">
            <span class="material-symbols-outlined text-primary text-2xl">keyboard</span>
        </div>
        <h1 class="text-xl font-bold tracking-tight text-slate-800 dark:text-slate-100">XcelerType</h1>
    </div>
    <div class="flex items-center gap-6">
        <nav class="hidden md:flex items-center gap-8">
            <a class="text-sm font-medium text-primary border-b-2 border-primary pb-1" href="/">Test</a>
        </nav>
        <button id="darkModeToggle" type="button" class="flex items-center justify-center rounded-lg h-10 w-10 bg-primary/10 text-primary hover:bg-primary/20 transition-all">
            <span class="material-symbols-outlined text-[20px]" id="darkModeIcon">dark_mode</span>
        </button>
    </div>
</header>

<!-- App Container -->
<main class="max-w-5xl mx-auto px-6 py-6 md:py-8 flex flex-col items-center justify-start grow">
    

    <!-- Typing Interface Form -->
    <form th:action="@{/result}" method="post" class="w-full flex flex-col relative py-2 px-2 group">
        
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-base md:text-lg font-bold text-slate-700 dark:text-slate-300">Type the paragraph below:</h2>
            <div class="flex items-center gap-2 px-4 py-2 bg-slate-100 dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 shadow-sm">
                <span class="material-symbols-outlined text-primary">timer</span>
                <span id="timer-display" class="font-mono text-xl font-bold text-slate-900 dark:text-slate-100">60s</span>
            </div>
        </div>

        <!-- Original Text Display (Character Highlighted) -->
        <div id="text-display" class="font-mono text-lg md:text-xl text-slate-500 dark:text-slate-400 select-none mb-4 md:mb-6 p-4 md:p-6 bg-slate-100 dark:bg-slate-800/50 rounded-xl leading-relaxed border border-slate-200 dark:border-slate-700 whitespace-pre-wrap">
            <!-- Words will be injected here by Javascript -->
        </div>

        <!-- Hidden inputs -->
        <input type="hidden" id="heatmapData" name="heatmapData" value="{}">
        <input type="hidden" id="originalText" name="originalText" th:value="${paragraph}">
        <input type="hidden" id="timeElapsed" name="timeElapsed" value="0">

        <!-- User Input Area -->
        <textarea 
            id="typedText"
            name="typedText" 
            rows="4" 
            class="w-full font-mono text-xl md:text-2xl text-slate-900 dark:text-slate-100 bg-transparent border-2 border-slate-200 dark:border-slate-700 rounded-xl p-4 md:p-6 focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none resize-none"
            placeholder="Start typing here..." 
            required
            th:text="${typedText != null} ? ${typedText} : ''"
            autofocus
        ></textarea>
        
        <div class="mt-4 md:mt-6 flex justify-end gap-3 md:gap-4">
            <button type="button" onclick="window.location.reload();" class="flex items-center gap-2 px-6 py-3 md:px-8 md:py-4 bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-bold rounded-xl hover:bg-slate-300 dark:hover:bg-slate-700 transition-all shadow-md hover:-translate-y-0.5">
                <span class="material-symbols-outlined text-[20px]">restart_alt</span>
                Reset
            </button>
            <button type="submit" class="flex items-center gap-2 px-6 py-3 md:px-8 md:py-4 bg-primary text-white font-bold rounded-xl hover:bg-primary-dark transition-all shadow-md shadow-primary/20 hover:-translate-y-0.5">
                <span class="material-symbols-outlined text-[20px]">bolt</span>
                Submit Speed Test
            </button>
        </div>
    </form>
</main>

<!-- Persistent Stats Footer -->
<footer class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-t border-slate-100 dark:border-slate-800 px-6 py-4 z-50">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
        <div class="flex gap-12">
            <!-- Highest Score -->
            <div class="flex flex-col">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Highest Score</span>
                <div class="flex items-baseline gap-1">
                    <span class="text-4xl font-bold text-amber-500" th:text="${highestWpm}">0</span>
                    <span class="text-xs font-medium text-slate-400">wpm</span>
                </div>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <a href="/" th:if="${wpm != null}" class="flex items-center gap-2 px-6 py-3 bg-slate-100 dark:bg-slate-800 rounded-lg text-slate-600 dark:text-slate-300 font-bold hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                <span class="material-symbols-outlined text-[20px]">refresh</span>
                Try Again
            </a>
        </div>
    </div>
</footer>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const typedTextArea = document.getElementById("typedText");
        const heatmapInput = document.getElementById("heatmapData");
        const originalTextInput = document.getElementById("originalText");
        const textDisplayDiv = document.getElementById("text-display");
        
        // --- Character Highlighting Logic ---
        
        const originalText = originalTextInput.value;
        const chars = originalText.split('');
        
        // Wrap each character in a span
        textDisplayDiv.innerHTML = chars.map((char, index) => 
            `<span id="char-${index}" class="transition-colors duration-75">${char}</span>`
        ).join("");
        
        // Function to update highlights
        const updateHighlight = () => {
            const typedContent = typedTextArea.value;
            const typedChars = typedContent.split('');

            // Reset all and apply styles
            chars.forEach((char, index) => {
                const span = document.getElementById(`char-${index}`);
                if (!span) return;
                
                // Reset classes
                span.className = "transition-colors duration-75";
                
                if (index < typedChars.length) {
                    // Passed characters
                    if (typedChars[index] === char) {
                        // Correctly typed
                        span.classList.add("text-primary", "font-bold");
                    } else {
                        // Incorrectly typed
                        span.classList.add("text-rose-500", "font-bold", "bg-rose-500/20", "px-0.5", "rounded");
                    }
                } else if (index === typedChars.length) {
                    // Current active character cursor
                    span.classList.add("text-slate-900", "dark:text-white", "font-black", "bg-slate-300", "dark:bg-slate-600", "px-0.5", "rounded");
                } else {
                    // Future characters
                    span.classList.add("text-slate-400", "dark:text-slate-600");
                }
            });
        };
        
        // Initial highlight setup
        updateHighlight();
        
        // Timer Logic
        let timerStarted = false;
        let timeLeft = 60;
        let timeElapsed = 0;
        let timerInterval;
        const timerDisplay = document.getElementById("timer-display");
        const typingForm = document.querySelector("form");
        const timeElapsedInput = document.getElementById("timeElapsed");

        // Listen to input events for character highlighting and timer trigger
        typedTextArea.addEventListener("input", (e) => {
            if (!timerStarted && typedTextArea.value.length > 0) {
                timerStarted = true;
                timerInterval = setInterval(() => {
                    timeLeft--;
                    timeElapsed++;
                    timeElapsedInput.value = timeElapsed;
                    timerDisplay.textContent = timeLeft + "s";
                    
                    if (timeLeft <= 10 && timeLeft > 0) {
                        timerDisplay.classList.add("text-rose-500", "dark:text-rose-400");
                        timerDisplay.classList.remove("text-slate-900", "dark:text-slate-100");
                    }

                    if (timeLeft === 0) {
                        clearInterval(timerInterval);
                        typedTextArea.readOnly = true;
                        timerDisplay.textContent = "0s";
                        typingForm.submit();
                    }
                }, 1000);
            }
            updateHighlight();
        });
        
        // Stop timer on manual submit
        typingForm.addEventListener("submit", () => {
             clearInterval(timerInterval);
             // Ensure at least 1 second passed to avoid Infinity WPM
             if (timeElapsed === 0) timeElapsedInput.value = 1;
        });
        
        // --- Heatmap Data Collection Logic ---
        
        // Store key frequencies
        const keyFrequencies = {};
        
        // Only track valid standard characters (A-Z) and map spacing if needed
        typedTextArea.addEventListener("keydown", (e) => {
            // Check for Enter key to submit form
            if (e.key === "Enter") {
                e.preventDefault(); // Prevent new line
                typingForm.submit();
                return;
            }

            // Ignore modifiers, backspace, etc. purely track typing keys
            if (e.key.length === 1 && e.key.match(/[a-zA-Z\s]/)) {
                const key = e.key.toUpperCase();
                keyFrequencies[key] = (keyFrequencies[key] || 0) + 1;
                
                // Update hidden input with JSON string
                heatmapInput.value = JSON.stringify(keyFrequencies);
            }
        });
    });

    // Dark mode toggle functionality
    const darkModeToggle = document.getElementById('darkModeToggle');
    const darkModeIcon = document.getElementById('darkModeIcon');
    
    // Check initial state
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
        if (darkModeIcon) darkModeIcon.textContent = 'light_mode';
    } else {
        document.documentElement.classList.remove('dark');
        if (darkModeIcon) darkModeIcon.textContent = 'dark_mode';
    }

    if (darkModeToggle) {
        darkModeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            if (document.documentElement.classList.contains('dark')) {
                localStorage.theme = 'dark';
                if (darkModeIcon) darkModeIcon.textContent = 'light_mode';
            } else {
                localStorage.theme = 'light';
                if (darkModeIcon) darkModeIcon.textContent = 'dark_mode';
            }
        });
    }
</script>

</body>
</html>
