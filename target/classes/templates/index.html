<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>XcelerType Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b981", 
                        "background-light": "#fcfdfd",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200 pb-32">

<!-- LOADING OVERLAY -->
<div id="loading-overlay" class="fixed inset-0 z-[100] bg-background-light dark:bg-background-dark flex h-screen w-full flex-col items-center justify-center overflow-hidden transition-opacity duration-500">
<!-- Background Decor -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary/20 blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] rounded-full bg-blue-500/10 blur-[120px]"></div>
</div>
<!-- Main Container -->
<div class="relative z-10 flex flex-col items-center max-w-[480px] w-full px-6">
<!-- Logo Section -->
<div class="flex flex-col items-center gap-6 mb-12">
<div class="relative size-24 bg-gradient-to-tr from-primary to-blue-500 rounded-[28px] flex items-center justify-center shadow-2xl shadow-primary/40 ring-4 ring-white/10 dark:ring-white/5 overflow-hidden group">
    <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-20 mix-blend-overlay"></div>
    <svg class="text-white size-12 relative z-10 transform group-hover:scale-110 transition-transform duration-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 15h8m-4-3v6" />
    </svg>
</div>
<h1 class="text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-primary via-blue-500 to-purple-600">XcelerType</h1>
</div>
<!-- Progress Section -->
<div class="w-full space-y-4">
<div class="flex items-end justify-between px-1">
<div class="flex flex-col gap-1">
<span class="text-xs font-semibold uppercase tracking-wider text-primary/80 dark:text-primary/90">System Status</span>
<p class="text-sm font-medium text-slate-600 dark:text-slate-400">Optimizing workspace assets...</p>
</div>
<span id="progress-text" class="text-lg font-bold text-slate-900 dark:text-slate-100">0%</span>
</div>
<div class="h-3 w-full bg-primary/10 dark:bg-primary/5 rounded-full overflow-hidden border border-primary/5">
<div id="progress-bar" class="h-full bg-gradient-to-r from-primary to-blue-500 rounded-full transition-all duration-300" style="width: 0%;"></div>
</div>
<div class="flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-sm text-primary">sync</span>
<span class="text-xs font-normal text-slate-500 dark:text-slate-500 italic">Syncing custom dictionary and layouts</span>
</div>
</div>
<!-- 3D Cube Animation Container -->
<div class="mt-16 w-full max-w-[320px]">
<div class="aspect-video rounded-xl bg-white/50 dark:bg-slate-800/30 shadow-inner border border-slate-200/50 dark:border-slate-700/50 flex items-center justify-center p-4 overflow-hidden relative backdrop-blur-sm">
<style>
.cube-wrap {
  width: 80px;
  height: 80px;
  perspective: 800px;
  perspective-origin: 50% -100px;
  margin-top: 20px;
}
.cube {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  animation: spin 3.5s infinite ease-in-out;
}
.cube-face {
  position: absolute;
  width: 80px;
  height: 80px;
  background: rgba(123, 0, 255, 0.75);
  border: 2px solid rgba(255,255,255,0.4);
  box-shadow: 0 0 20px rgba(123,0,255,0.4) inset, 0 0 20px rgba(59,130,246,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: monospace;
  font-size: 32px;
  font-weight: 900;
  color: white;
  text-shadow: 0 0 10px rgba(255,255,255,0.8);
  border-radius: 8px;
}
.front  { transform: rotateY(  0deg) translateZ(40px); }
.right  { transform: rotateY( 90deg) translateZ(40px); }
.back   { transform: rotateY(180deg) translateZ(40px); }
.left   { transform: rotateY(-90deg) translateZ(40px); }
.top    { transform: rotateX( 90deg) translateZ(40px); background: rgba(59, 130, 246, 0.75); }
.bottom { transform: rotateX(-90deg) translateZ(40px); background: rgba(59, 130, 246, 0.75); }

@keyframes spin {
  0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
  33% { transform: rotateX(180deg) rotateY(90deg) rotateZ(45deg); }
  66% { transform: rotateX(270deg) rotateY(180deg) rotateZ(90deg); }
  100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
}
</style>
<div class="cube-wrap">
    <div class="cube">
        <div class="cube-face front">W</div>
        <div class="cube-face back">M</div>
        <div class="cube-face right">P</div>
        <div class="cube-face left">!</div>
        <div class="cube-face top"></div>
        <div class="cube-face bottom"></div>
    </div>
</div>
</div>
</div>
<!-- Tip of the Day Footer -->
<div class="mt-16 flex flex-col items-center text-center gap-3">
<div class="px-4 py-1.5 rounded-full bg-primary/5 dark:bg-primary/10 border border-primary/10">
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-primary">Pro Tip</span>
</div>
<p id="pro-tip-text" class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed px-4 max-w-md">
    <!-- Random tip injected here -->
</p>
</div>
</div>
<!-- Navigation Mock (Removed) -->
</div>

<!-- Main Navigation -->
<header class="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-800">
    <div class="flex items-center gap-3">
        <div class="relative size-10 bg-gradient-to-tr from-primary to-blue-500 rounded-xl flex items-center justify-center shadow-lg shadow-primary/30 ring-2 ring-white/10 dark:ring-white/5 overflow-hidden group">
            <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-20 mix-blend-overlay"></div>
            <svg class="text-white size-5 relative z-10 transform group-hover:scale-110 transition-transform duration-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 15h8m-4-3v6" />
            </svg>
        </div>
        <h1 class="text-xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-primary via-blue-500 to-purple-600">XcelerType</h1>
    </div>
    <div class="flex items-center gap-6">
        <nav class="hidden md:flex items-center gap-8">
            <a class="text-sm font-medium text-primary border-b-2 border-primary pb-1" href="/">Test</a>
        </nav>
        <button id="darkModeToggle" type="button" class="flex items-center justify-center rounded-lg h-10 w-10 bg-primary/10 text-primary hover:bg-primary/20 transition-all">
            <span class="material-symbols-outlined text-[20px]" id="darkModeIcon">dark_mode</span>
        </button>
    </div>
</header>

<!-- App Container -->
<main class="max-w-5xl mx-auto px-6 py-6 md:py-8 flex flex-col items-center justify-start grow">
    

    <!-- Typing Interface Form -->
    <form th:action="@{/result}" method="post" class="w-full flex flex-col relative py-2 px-2 group">
        
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-base md:text-lg font-bold text-slate-700 dark:text-slate-300">Type the paragraph below:</h2>
            <div class="flex items-center gap-2 px-4 py-2 bg-slate-100 dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 shadow-sm">
                <span class="material-symbols-outlined text-primary">timer</span>
                <span id="timer-display" class="font-mono text-xl font-bold text-slate-900 dark:text-slate-100">60s</span>
            </div>
        </div>

        <!-- Original Text Display (Character Highlighted) -->
        <div id="text-display" class="font-mono text-lg md:text-xl text-slate-500 dark:text-slate-400 select-none mb-4 md:mb-6 p-4 md:p-6 bg-slate-100 dark:bg-slate-800/50 rounded-xl leading-relaxed border border-slate-200 dark:border-slate-700 whitespace-pre-wrap">
            <!-- Words will be injected here by Javascript -->
        </div>

        <!-- Hidden inputs -->
        <input type="hidden" id="heatmapData" name="heatmapData" value="{}">
        <input type="hidden" id="originalText" name="originalText" th:value="${paragraph}">
        <input type="hidden" id="timeElapsed" name="timeElapsed" value="0">
        <input type="hidden" id="perfectWordsCount" name="perfectWordsCount" value="0">

        <!-- User Input Area -->
        <textarea 
            id="typedText"
            name="typedText" 
            rows="4" 
            class="w-full font-mono text-xl md:text-2xl text-slate-900 dark:text-slate-100 bg-transparent border-2 border-slate-200 dark:border-slate-700 rounded-xl p-4 md:p-6 focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none resize-none"
            placeholder="Start typing here..." 
            required
            th:text="${typedText != null} ? ${typedText} : ''"
            autofocus
        ></textarea>
        
        <div class="mt-4 md:mt-6 flex justify-end gap-3 md:gap-4">
            <button type="button" onclick="window.location.href='/?retest=true';" class="flex items-center gap-2 px-6 py-3 md:px-8 md:py-4 bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-bold rounded-xl hover:bg-slate-300 dark:hover:bg-slate-700 transition-all shadow-md hover:-translate-y-0.5">
                <span class="material-symbols-outlined text-[20px]">restart_alt</span>
                Reset
            </button>
            <button type="submit" class="flex items-center gap-2 px-6 py-3 md:px-8 md:py-4 bg-primary text-white font-bold rounded-xl hover:bg-primary-dark transition-all shadow-md shadow-primary/20 hover:-translate-y-0.5">
                <span class="material-symbols-outlined text-[20px]">bolt</span>
                Submit Speed Test
            </button>
        </div>
    </form>
</main>

<!-- Persistent Stats Footer -->
<footer class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-t border-slate-100 dark:border-slate-800 px-6 py-4 z-50">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
        <div class="flex gap-12">
            <!-- Highest Score -->
            <div class="flex flex-col">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Highest Score</span>
                <div class="flex items-baseline gap-1">
                    <span class="text-4xl font-bold text-amber-500" th:text="${highestWpm}">0</span>
                    <span class="text-xs font-medium text-slate-400">wpm</span>
                </div>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <a href="/?retest=true" th:if="${wpm != null}" class="flex items-center gap-2 px-6 py-3 bg-slate-100 dark:bg-slate-800 rounded-lg text-slate-600 dark:text-slate-300 font-bold hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                <span class="material-symbols-outlined text-[20px]">refresh</span>
                Try Again
            </a>
        </div>
    </div>
</footer>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // --- Random Pro Tip Logic ---
        const proTips = [
            "Keep your fingers on the <span class='font-semibold text-slate-900 dark:text-slate-200'>home row</span> (ASDF and JKL;) for maximum efficiency.",
            "Focus completely on <span class='font-semibold text-slate-900 dark:text-slate-200'>accuracy</span> first. Once you stop making mistakes, speed naturally follows.",
            "Look purely at the <span class='font-semibold text-slate-900 dark:text-slate-200'>screen</span>, not your hands. This builds true muscle memory.",
            "Sit up straight with both feet flat on the floor to maintain <span class='font-semibold text-slate-900 dark:text-slate-200'>posture</span> and prevent pain.",
            "Hit the spacebar solely with the thumb of your <span class='font-semibold text-slate-900 dark:text-slate-200'>non-dominant hand</span> to save movement.",
            "Use the <span class='font-semibold text-slate-900 dark:text-slate-200'>opposite shift key</span>. For instance, hold Right Shift to capitalize 'A'.",
            "Establish a <span class='font-semibold text-slate-900 dark:text-slate-200'>steady rhythm</span> rather than typing in short, frantic bursts.",
            "Take regular breaks! Resting your hands prevents cramping and <span class='font-semibold text-slate-900 dark:text-slate-200'>repetitive strain</span>."
        ];
        
        const tipElement = document.getElementById("pro-tip-text");
        if (tipElement) {
            const randomTip = proTips[Math.floor(Math.random() * proTips.length)];
            tipElement.innerHTML = "Tip: " + randomTip;
        }

        // --- Loading Overlay Logic ---
        const urlParams = new URLSearchParams(window.location.search);
        const isRetest = urlParams.get('retest') === 'true';

        const loadingOverlay = document.getElementById("loading-overlay");
        const progressBar = document.getElementById("progress-bar");
        const progressText = document.getElementById("progress-text");
        let percent = 0;
        
        if (loadingOverlay) {
            if (isRetest) {
                loadingOverlay.classList.add("hidden");
                // Focus typing field immediately
                setTimeout(() => document.getElementById("typedText").focus(), 100);
            } else {
                const interval = setInterval(() => {
                // Faster increment to complete in ~3 seconds total
                percent += Math.floor(Math.random() * 10) + 5;
                if (percent > 100) percent = 100;
                
                if (progressBar) progressBar.style.width = percent + '%';
                if (progressText) progressText.innerText = percent + '%';
                
                if (percent === 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        loadingOverlay.classList.add("opacity-0");
                        setTimeout(() => {
                            loadingOverlay.classList.add("hidden");
                            // Auto-focus typing field nicely
                            document.getElementById("typedText").focus();
                        }, 500); // Wait for opacity transition
                    }, 500); // Wait half a second at 100%
                }
            }, 180); // 180ms chunks makes it significantly faster (~3s total load)
            }
        }

        const typedTextArea = document.getElementById("typedText");
        const heatmapInput = document.getElementById("heatmapData");
        const originalTextInput = document.getElementById("originalText");
        const textDisplayDiv = document.getElementById("text-display");
        
        // --- Character Highlighting Logic ---
        
        const originalText = originalTextInput.value;
        const chars = originalText.split('');
        
        // Track perfectly typed words
        let erroredWords = new Set();
        const wordIndices = [];
        let wIdx = 0;
        for (let i = 0; i < chars.length; i++) {
            wordIndices.push(wIdx);
            if (chars[i] === ' ') {
                wIdx++;
            }
        }
        
        // Wrap each character in a span
        textDisplayDiv.innerHTML = chars.map((char, index) => 
            `<span id="char-${index}" class="transition-colors duration-75">${char}</span>`
        ).join("");
        
        // Function to update highlights
        const updateHighlight = () => {
            const typedContent = typedTextArea.value;
            const typedChars = typedContent.split('');

            // Reset all and apply styles
            chars.forEach((char, index) => {
                const span = document.getElementById(`char-${index}`);
                if (!span) return;
                
                // Reset classes
                span.className = "transition-colors duration-75";
                
                if (index < typedChars.length) {
                    // Passed characters
                    if (typedChars[index] === char) {
                        // Correctly typed
                        span.classList.add("text-primary", "font-bold");
                    } else {
                        // Incorrectly typed
                        if (index < wordIndices.length) {
                             erroredWords.add(wordIndices[index]);
                        }
                        span.classList.add("text-rose-500", "font-bold", "bg-rose-500/20", "px-0.5", "rounded");
                    }
                } else if (index === typedChars.length) {
                    // Current active character cursor
                    span.classList.add("text-slate-900", "dark:text-white", "font-black", "bg-slate-300", "dark:bg-slate-600", "px-0.5", "rounded");
                } else {
                    // Future characters
                    span.classList.add("text-slate-400", "dark:text-slate-600");
                }
            });
        };
        
        // Initial highlight setup
        updateHighlight();
        
        // Timer Logic
        let timerStarted = false;
        let timeLeft = 60;
        let timeElapsed = 0;
        let timerInterval;
        const timerDisplay = document.getElementById("timer-display");
        const typingForm = document.querySelector("form");
        const timeElapsedInput = document.getElementById("timeElapsed");

        // Listen to input events for character highlighting and timer trigger
        typedTextArea.addEventListener("input", (e) => {
            if (!timerStarted && typedTextArea.value.length > 0) {
                timerStarted = true;
                timerInterval = setInterval(() => {
                    timeLeft--;
                    timeElapsed++;
                    timeElapsedInput.value = timeElapsed;
                    timerDisplay.textContent = timeLeft + "s";
                    
                    if (timeLeft <= 10 && timeLeft > 0) {
                        timerDisplay.classList.add("text-rose-500", "dark:text-rose-400");
                        timerDisplay.classList.remove("text-slate-900", "dark:text-slate-100");
                    }

                    if (timeLeft === 0) {
                        clearInterval(timerInterval);
                        typedTextArea.readOnly = true;
                        timerDisplay.textContent = "0s";
                        typingForm.submit();
                    }
                }, 1000);
            }
            updateHighlight();
        });
        
        // Stop timer on manual submit
        typingForm.addEventListener("submit", () => {
             clearInterval(timerInterval);
             // Ensure at least 1 second passed to avoid Infinity WPM
             if (timeElapsed === 0) timeElapsedInput.value = 1;
             
             // Calculate perfect words
             const typedContent = typedTextArea.value;
             const wordEnds = [];
             for (let i = 0; i < chars.length; i++) {
                 if (chars[i] === ' ') {
                     wordEnds.push(i);
                 }
             }
             wordEnds.push(chars.length);
             
             let perfectCount = 0;
             for (let w = 0; w < wordEnds.length; w++) {
                 let wordEndIndex = wordEnds[w];
                 if (w < wordEnds.length - 1) {
                     // Requires typing past the space
                     if (typedContent.length > wordEndIndex && !erroredWords.has(w)) {
                         perfectCount++;
                     }
                 } else {
                     // Requires reaching the end of the final word
                     if (typedContent.length >= wordEndIndex && !erroredWords.has(w)) {
                         perfectCount++;
                     }
                 }
             }
             
             document.getElementById("perfectWordsCount").value = perfectCount;
        });
        
        // --- Heatmap Data Collection Logic ---
        
        // Store key frequencies
        const keyFrequencies = {};
        
        // Only track valid standard characters (A-Z) and map spacing if needed
        typedTextArea.addEventListener("keydown", (e) => {
            // Track backspaces for perfect word calculation
            if (e.key === "Backspace") {
                let currentIndex = typedTextArea.value.length - 1;
                if (currentIndex >= 0 && currentIndex < wordIndices.length) {
                    erroredWords.add(wordIndices[currentIndex]);
                }
            }

            // Check for Enter key to submit form
            if (e.key === "Enter") {
                e.preventDefault(); // Prevent new line
                typingForm.submit();
                return;
            }

            // Ignore modifiers, backspace, etc. purely track typing keys
            if (e.key.length === 1 && e.key.match(/[a-zA-Z\s]/)) {
                const key = e.key.toUpperCase();
                keyFrequencies[key] = (keyFrequencies[key] || 0) + 1;
                
                // Update hidden input with JSON string
                heatmapInput.value = JSON.stringify(keyFrequencies);
            }
        });
    });

    // Dark mode toggle functionality
    const darkModeToggle = document.getElementById('darkModeToggle');
    const darkModeIcon = document.getElementById('darkModeIcon');
    
    // Check initial state
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
        if (darkModeIcon) darkModeIcon.textContent = 'light_mode';
    } else {
        document.documentElement.classList.remove('dark');
        if (darkModeIcon) darkModeIcon.textContent = 'dark_mode';
    }

    if (darkModeToggle) {
        darkModeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            if (document.documentElement.classList.contains('dark')) {
                localStorage.theme = 'dark';
                if (darkModeIcon) darkModeIcon.textContent = 'light_mode';
            } else {
                localStorage.theme = 'light';
                if (darkModeIcon) darkModeIcon.textContent = 'dark_mode';
            }
        });
    }
</script>

</body>
</html>
