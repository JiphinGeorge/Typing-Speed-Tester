<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ZenType Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b981", 
                        "background-light": "#fcfdfd",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200 pb-32">
<!-- Main Navigation -->
<header class="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-800">
    <div class="flex items-center gap-3">
        <div class="p-2 bg-primary/10 rounded-lg">
            <span class="material-symbols-outlined text-primary text-2xl">keyboard</span>
        </div>
        <h1 class="text-xl font-bold tracking-tight text-slate-800 dark:text-slate-100">ZenType</h1>
    </div>
    <div class="flex items-center gap-6">
        <nav class="hidden md:flex items-center gap-8">
            <a class="text-sm font-medium text-primary border-b-2 border-primary pb-1" href="/">Test</a>
        </nav>
    </div>
</header>

<!-- App Container -->
<main class="max-w-5xl mx-auto px-6 py-12 flex flex-col items-center justify-start grow">
    
    <!-- Top Toolbar -->
    <div class="w-full flex justify-between items-center mb-12">
        <div class="flex items-center gap-2 px-3 py-2 bg-slate-100 dark:bg-slate-800 rounded-lg">
            <span class="material-symbols-outlined text-[18px] text-slate-400">language</span>
            <span class="text-sm font-medium">English (US)</span>
        </div>
    </div>

    <!-- Typing Interface Form -->
    <form th:action="@{/result}" method="post" class="w-full flex flex-col relative py-4 px-2 group">
        
        <!-- Original Text Display (Word Highlighted) -->
        <div id="text-display" class="font-mono text-xl md:text-2xl text-slate-500 dark:text-slate-400 select-none mb-8 p-6 bg-slate-100 dark:bg-slate-800/50 rounded-xl leading-relaxed border border-slate-200 dark:border-slate-700">
            <!-- Words will be injected here by Javascript -->
        </div>

        <!-- Hidden inputs -->
        <input type="hidden" id="heatmapData" name="heatmapData" value="{}">
        <input type="hidden" id="originalText" th:value="${paragraph}">

        <!-- User Input Area -->
        <textarea 
            id="typedText"
            name="typedText" 
            rows="6" 
            class="w-full font-mono text-2xl md:text-3xl text-slate-900 dark:text-slate-100 bg-transparent border-2 border-slate-200 dark:border-slate-700 rounded-xl p-6 focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none"
            placeholder="Start typing here..." 
            required
            th:text="${typedText != null} ? ${typedText} : ''"
            autofocus
        ></textarea>
        
        <div class="mt-8 flex justify-end">
            <button type="submit" class="flex items-center gap-2 px-8 py-4 bg-primary text-white font-bold rounded-xl hover:bg-primary-dark transition-all shadow-lg shadow-primary/20 hover:-translate-y-1">
                <span class="material-symbols-outlined">bolt</span>
                Submit Speed Test
            </button>
        </div>
    </form>
</main>

<!-- Persistent Stats Footer -->
<footer class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-t border-slate-100 dark:border-slate-800 px-8 py-6 z-50">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
        <div class="flex gap-12">
            <!-- WPM -->
            <div class="flex flex-col">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Words Per Minute</span>
                <div class="flex items-baseline gap-1" th:if="${wpm != null}">
                    <span class="text-4xl font-bold text-primary" th:text="${wpm}">84</span>
                    <span class="text-xs font-medium text-slate-400">wpm</span>
                </div>
                <div class="flex items-baseline gap-1" th:unless="${wpm != null}">
                    <span class="text-4xl font-bold text-slate-300 dark:text-slate-700">-</span>
                </div>
            </div>
            
            <!-- Accuracy -->
            <div class="flex flex-col">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Accuracy</span>
                <div class="flex items-baseline gap-1" th:if="${accuracy != null}">
                    <span class="text-4xl font-bold text-slate-800 dark:text-slate-100" th:text="${accuracy}">98.2</span>
                    <span class="text-xs font-medium text-slate-400">%</span>
                </div>
                <div class="flex items-baseline gap-1" th:unless="${accuracy != null}">
                    <span class="text-4xl font-bold text-slate-300 dark:text-slate-700">-</span>
                </div>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <a href="/" th:if="${wpm != null}" class="flex items-center gap-2 px-6 py-3 bg-slate-100 dark:bg-slate-800 rounded-lg text-slate-600 dark:text-slate-300 font-bold hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                <span class="material-symbols-outlined text-[20px]">refresh</span>
                Try Again
            </a>
        </div>
    </div>
</footer>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const typedTextArea = document.getElementById("typedText");
        const heatmapInput = document.getElementById("heatmapData");
        const originalTextInput = document.getElementById("originalText");
        const textDisplayDiv = document.getElementById("text-display");
        
        // --- Word Highlighting Logic ---
        
        const originalText = originalTextInput.value;
        const words = originalText.trim().split(/\s+/);
        
        // Wrap each word in a span
        textDisplayDiv.innerHTML = words.map((word, index) => 
            `<span id="word-${index}" class="transition-colors duration-200">${word}</span>`
        ).join(" ");
        
        // Function to update highlights
        const updateHighlight = () => {
            const typedContent = typedTextArea.value;
            const typedWords = typedContent.trim().split(/\s+/);
            
            // If starting fresh or space at the end, the current index is length of typedWords
            // E.g. typing "The quick " -> ends with space, so we are on index 2.
            let currentIndex = typedWords.length - 1;
            if (typedContent.endsWith(' ') || typedContent.endsWith('\n')) {
                 currentIndex = typedWords.length;
            }
            if (typedContent.trim() === '') {
                 currentIndex = 0; // Started at 0
            }

            // Reset all and apply styles
            words.forEach((_, index) => {
                const span = document.getElementById(`word-${index}`);
                if (!span) return;
                
                // Reset classes
                span.className = "transition-colors duration-200";
                
                if (index < currentIndex) {
                    // Passed words - subtle dark/light indication (assume typed correctly for visual flow)
                    span.classList.add("text-slate-800", "dark:text-slate-300");
                } else if (index === currentIndex) {
                    // Current active word
                    span.classList.add("text-primary", "font-bold", "bg-primary/10", "px-1", "rounded");
                } else {
                    // Future words
                    span.classList.add("text-slate-400", "dark:text-slate-600");
                }
            });
        };
        
        // Initial highlight setup
        updateHighlight();
        
        // Listen to input events for word highlighting
        typedTextArea.addEventListener("input", updateHighlight);
        
        // --- Heatmap Data Collection Logic ---
        
        // Store key frequencies
        const keyFrequencies = {};
        
        // Only track valid standard characters (A-Z) and map spacing if needed
        typedTextArea.addEventListener("keydown", (e) => {
            // Ignore modifiers, backspace, etc. purely track typing keys
            if (e.key.length === 1 && e.key.match(/[a-zA-Z\s]/)) {
                const key = e.key.toUpperCase();
                keyFrequencies[key] = (keyFrequencies[key] || 0) + 1;
                
                // Update hidden input with JSON string
                heatmapInput.value = JSON.stringify(keyFrequencies);
            }
        });
    });
</script>

</body>
</html>
